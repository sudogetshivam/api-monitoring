services:
    postgres:
        image: postgres:15-alpine
        container_name: api-monitoring-postgres
        environment:
          POSTGRES_DB: api_monitoring
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
        ports:
          - "5432:5432"
        volumes:
          - postgres_data:/var/lib/postgresql/data #this is the container path of the volume that will name in this case volume name is postgres_data
          - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql #this is bind Mount, runs all sql files inside this folder when the container starts for the first time
        networks:
          - api-monitoring-network
        restart: unless-stopped
        healthcheck:
        #by mistakenly you  wrote api-monitoring inplace of api_monitoring thats why 
          test: ["CMD-SHELL","pg_isready -U postgres -d api_monitoring"] #this command will check if postgres is ready to accept connections or not, -U is for username and -d is for database name
          interval: 10s
          timeout: 5s
          retries: 5
          start_period: 30s
    mongo:
      image: mongo:6.0
      container_name: api-monitoring-mongo
      ports:
        - "27017:27017"
      volumes:
        - mongo_data:/data/db
      networks:
        - api-monitoring-network
      restart: unless-stopped
    rabbitmq:
      image: rabbitmq:3-management-alpine
      container_name: api-monitoring-rabbitmq
      ports:
        - "5672:5672"
        - "15672:15672"
      environment:
        RABBITMQ_DEFAULT_USER: api_user
        RABBITMQ_DEFAULT_PASS: secure_password
        RABBITMQ_DEFAULT_VHOST: api_monitoring_app
      volumes:
        - rabbitmq_data:/var/lib/rabbitmq
      networks:
        - api-monitoring-network
      restart: unless-stopped
      healthcheck:
        test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]        
        interval: 30s
        timeout: 10s
        retries: 5
    pgadmin:
      image: dpage/pgadmin4:7
      container_name: api-monitoring-admin
      environment:
        PGADMIN_DEFAULT_EMAIL: admin@example.com
        PGADMIN_DEFAULT_PASSWORD: admin
      volumes:
        - pgadmin_admin:/var/lib/pgadmin
      networks:
        - api-monitoring-network
      restart: unless-stopped
      depends_on:
        - postgres
    api-app:
      build:
        context: .
        dockerfile: Dockerfile
      container_name: api-monitoring-app
      environment:
        NODE_ENV: production
        PORT: 5000
        # MongoDB (local container)
        MONGO_URI: mongodb://mongo:27017/api_monitoring
        MONGO_DB_NAME: api_monitoring
        # PostgreSQL (Docker container)
        PG_HOST: postgres
        PG_PORT: 5432
        PG_DATABASE: api_monitoring
        PG_USER: postgres
        PG_PASSWORD: postgres
        # RabbitMQ (Docker container)
        RABBITMQ_URL: amqp://api_user:secure_password@rabbitmq:5672/api_monitoring_app
        RABBITMQ_QUEUE: api_hits
        # Security
        JWT_SECRET: ${JWT_SECRET}
        JWT_EXPIRES_IN: 24h
        # Rate Limiting
        RATE_LIMIT_WINDOW_MS: 60000
        RATE_LIMIT_MAX_REQUESTS: 100
      ports:
        - "5000:5000"
      volumes:
        - ./logs:/app/logs
      networks:
        - api-monitoring-network
      depends_on:
        rabbitmq:
          condition: service_healthy
        postgres:
          condition: service_healthy
      restart: unless-stopped
      healthcheck:
        test: ["CMD","curl","-f","http://localhost:5000/health"]
        interval: 30s
        timeout: 10s
        retries: 3
volumes:
  postgres_data:
    driver: local #store the data in local machine, and everything inside volume index
  pgadmin_admin:
    driver: local
  rabbitmq_data:
    driver: local 
  mongo_data:
    driver: local

networks:
  api-monitoring-network:
    driver: bridge #allows containers to communicate with other containers in the same network, but isolates them from containers outside the network.


